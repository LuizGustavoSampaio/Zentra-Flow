spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/${PROD_DB_NAME}
    username: ${PROD_DB_USER}
    password: ${PROD_DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

#Log-Prod
logging:
  level:
    root: WARN
    com.zentra.zentraflow: INFO
  file:
    name: ./logs-locais/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
server:
  port: 8085