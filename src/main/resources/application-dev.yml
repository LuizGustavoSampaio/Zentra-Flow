spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/${DEV_DB_NAME}
    username: ${DEV_DB_USER}
    password: ${DEV_DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

#Log-dev
logging:
  level:
    root: INFO
    com.zentra.zentra_flow: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%X{traceId}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"

server:
  port: 8080